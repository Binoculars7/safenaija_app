<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autocorrection System Tester</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .test-case {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            background: #f8f9fa;
        }
        .test-case.passed {
            border-color: #28a745;
            background: #d4edda;
        }
        .test-case.failed {
            border-color: #dc3545;
            background: #f8d7da;
        }
        .input-text {
            background: #fff;
            border: 1px solid #ced4da;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
            font-family: monospace;
            color: #d9534f;
        }
        .output-text {
            background: #f0f0f0;
            border: 1px solid #ced4da;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
            font-family: monospace;
            color: #5cb85c;
        }
        .category-tag {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
        }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-badge {
            font-size: 12px;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 20px;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-passed { background: #d4edda; color: #155724; }
        .status-failed { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">🔤 Autocorrection System Tester</h1>
        <p class="text-muted">Test various misspellings to validate the enhanced autocorrection system</p>
        
        <div id="testContainer"></div>
        
        <div class="text-center mt-5">
            <button class="btn btn-primary btn-lg" onclick="runAllTests()">
                Run All Tests
            </button>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/typo-js@1.1.20/typo.min.js"></script>
    <script>
        var testCases = [
            {
                name: "Simple Misspelling - Traffic",
                input: "There was trafic congestion on the road",
                expected: "There was traffic congestion on the road",
                category: "traffic_congestion"
            },
            {
                name: "Medical Emergency",
                input: "Someone has a heart atack and is unconsious",
                expected: "Someone has a heart attack and is unconscious",
                category: "medical_emergency"
            },
            {
                name: "Robbery Report",
                input: "Theifs stole my car and robbed my house",
                expected: "Thieves stole my car and robbed my house",
                category: "robbery"
            },
            {
                name: "Accident Report",
                input: "There was a car acident on the highway with two vhicles",
                expected: "There was a car accident on the highway with two vehicles",
                category: "road_accident"
            },
            {
                name: "Missing Person",
                input: "A child is missing since yesterday and has dissapeared",
                expected: "A child is missing since yesterday and has disappeared",
                category: "missing_person"
            },
            {
                name: "Multiple Errors",
                input: "I recieved a threatning message from an unknwon person",
                expected: "I received a threatening message from an unknown person",
                category: "threat"
            },
            {
                name: "Assault Case",
                input: "Someone was attacked and beaten severly at the market",
                expected: "Someone was attacked and beaten severely at the market",
                category: "assault"
            },
            {
                name: "Fire Incident",
                input: "Their house is on fire and burning severly in the vilage",
                expected: "Their house is on fire and burning severely in the village",
                category: "fire_accident"
            }
        ];

        var typoChecker = null;

        function initializeSpellChecker() {
            if (typeof Typo === 'undefined') {
                console.warn('Typo.js not loaded');
                return;
            }
            try {
                typoChecker = new Typo('en_US');
                console.log('Spell checker initialized');
            } catch (e) {
                console.warn('Failed to initialize Typo.js:', e);
            }
        }

        function autocorrectText(text) {
            if (!text || text.trim().length === 0) {
                return text;
            }
            
            var correctedText = text;
            
            // Apply critical corrections first
            var criticalCorrections = [
                { wrong: /\bprotestin\b/gi, correct: 'protesting' },
                { wrong: /\bsuicid\b/gi, correct: 'suicide' },
                { wrong: /\bsuicde\b/gi, correct: 'suicide' },
                { wrong: /\bcommited\b/gi, correct: 'committed' },
                { wrong: /\baccidnt\b/gi, correct: 'accident' },
                { wrong: /\baccidnet\b/gi, correct: 'accident' },
                { wrong: /\bcollison\b/gi, correct: 'collision' },
                { wrong: /\bunconsious\b/gi, correct: 'unconscious' },
                { wrong: /\bunconcious\b/gi, correct: 'unconscious' },
                { wrong: /\bkidnapin\b/gi, correct: 'kidnapping' },
                { wrong: /\bkidnaping\b/gi, correct: 'kidnapping' },
                { wrong: /\bdisapeared\b/gi, correct: 'disappeared' }
            ];
            
            for (var i = 0; i < criticalCorrections.length; i++) {
                correctedText = correctedText.replace(criticalCorrections[i].wrong, criticalCorrections[i].correct);
            }
            
            if (typoChecker && typeof typoChecker.check === 'function') {
                try {
                    var words = correctedText.split(/(\s+)/);
                    var correctedWords = [];
                    
                    for (var w = 0; w < words.length; w++) {
                        var word = words[w];
                        
                        if (/^\s+$/.test(word)) {
                            correctedWords.push(word);
                            continue;
                        }
                        
                        var match = word.match(/^([a-zA-Z]+)(.*)$/);
                        if (!match) {
                            correctedWords.push(word);
                            continue;
                        }
                        
                        var actualWord = match[1];
                        var trailing = match[2];
                        
                        if (actualWord.length < 3) {
                            correctedWords.push(word);
                            continue;
                        }
                        
                        if (!typoChecker.check(actualWord.toLowerCase())) {
                            var suggestions = typoChecker.suggest(actualWord.toLowerCase(), 1);
                            
                            if (suggestions && suggestions.length > 0) {
                                var suggestion = suggestions[0];
                                
                                if (actualWord.charAt(0) === actualWord.charAt(0).toUpperCase()) {
                                    suggestion = suggestion.charAt(0).toUpperCase() + suggestion.slice(1);
                                }
                                
                                correctedWords.push(suggestion + trailing);
                            } else {
                                correctedWords.push(word);
                            }
                        } else {
                            correctedWords.push(word);
                        }
                    }
                    
                    correctedText = correctedWords.join('');
                } catch (e) {
                    console.warn('Error during spell checking:', e);
                }
            }
            
            return correctedText;
        }

        function renderTestCase(testCase, index) {
            var corrected = autocorrectText(testCase.input);
            var passed = corrected.toLowerCase() === testCase.expected.toLowerCase();
            
            var html = `
                <div class="test-case ${passed ? 'passed' : 'failed'}">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h5>${index + 1}. ${testCase.name}</h5>
                        <span class="status-badge ${passed ? 'status-passed' : 'status-failed'}">
                            ${passed ? '✓ PASSED' : '✗ FAILED'}
                        </span>
                    </div>
                    <div>
                        <strong>Input:</strong>
                        <div class="input-text">"${testCase.input}"</div>
                    </div>
                    <div>
                        <strong>Expected Output:</strong>
                        <div class="output-text">"${testCase.expected}"</div>
                    </div>
                    <div>
                        <strong>Actual Output:</strong>
                        <div class="output-text">"${corrected}"</div>
                    </div>
                    ${passed ? `
                        <div style="margin-top: 10px;">
                            <strong>Expected Category:</strong>
                            <div class="category-tag" style="background: #d4edda; color: #155724;">
                                ${testCase.category}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
            
            return html;
        }

        function runAllTests() {
            console.log('Starting tests...');
            var container = $('#testContainer');
            container.html('');
            
            var results = '';
            var passed = 0;
            var total = testCases.length;
            
            for (var i = 0; i < testCases.length; i++) {
                results += renderTestCase(testCases[i], i);
                var corrected = autocorrectText(testCases[i].input);
                if (corrected.toLowerCase() === testCases[i].expected.toLowerCase()) {
                    passed++;
                }
            }
            
            var percentage = Math.round((passed / total) * 100);
            var summaryColor = percentage >= 80 ? 'success' : percentage >= 60 ? 'warning' : 'danger';
            
            container.html(`
                <div class="alert alert-${summaryColor}" role="alert">
                    <h4 class="alert-heading">Test Results</h4>
                    <p><strong>Passed: ${passed}/${total}</strong> (${percentage}%)</p>
                </div>
                ${results}
            `);
        }

        $(document).ready(function() {
            initializeSpellChecker();
            console.log('Spell checker ready. Click "Run All Tests" to begin.');
        });
    </script>
</body>
</html>
