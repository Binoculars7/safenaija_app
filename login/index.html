<!doctype html>
<html lang="en">
  <head>
  	<title>SafeNaija - Making Nigeria a better home</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

	<link href="https://fonts.googleapis.com/css?family=Lato:300,400,700&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
	
	<link rel="stylesheet" href="css/style.css">

	</head>
	<body style="background: #1363c6;">
	<section class="ftco-section" style="margin-top: -3em;">
		<div class="container">
			<div class="row justify-content-center">

			</div>
			<div class="row justify-content-center">
				<div class="col-md-12 col-lg-10">
					<div class="wrap d-md-flex" style="box-shadow:0 0 10px rgba(0,0,0,.2); border: 1px dashed rgb(182, 182, 182);">
						<div class="img" style="position: relative; min-width:220px; background-image: url(images/bg-3.jpg); background-size: cover; background-position: center; box-shadow:0 0 3px rgba(0,0,0,.2); border: 1px dashed rgb(182, 182, 182);">
							<!-- Black overlay with some transparency -->
							<div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);"></div>
			      	</div>
						<div class="login-wrap p-4 p-md-5">
			      	<div class="d-flex">
			      		<div class="w-100" style="margin-top: -1em;">
			      			<h3 class="mb-4">SafeNaija</h3>
			      		</div>
								
			      	</div>
							<form action="#" class="signin-form" style="margin-top: -0.6em;">
			      		<div class="form-group mb-3">
			      			<label class="label" for="name">Email</label>
			      			<input type="email" class="form-control" placeholder="Email" required>
			      		</div>
		            <div class="form-group mb-3">
		            	<label class="label" for="password">Password</label>
		              <input type="password" class="form-control" placeholder="Password" required>
		            </div>
		            <div class="form-group">
		            	<button type="submit" class="form-control btn btn-primary rounded submit px-3">Login</button>
		            </div>
		            <div class="form-group d-md-flex">
		            	<div class="w-50 text-left">
			            	
									</div>
									<div class="w-50 text-md-right">
										<a href="#">Forgot Password</a>
									</div>
		            </div>
		          </form>
		          <p class="text-center">Don't have account? <a href="../signup/">Signup</a></p>
		        </div>
		      </div>
				</div>
			</div>
		</div>
	</section>

	<script src="js/jquery.min.js"></script>
  <script src="js/popper.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/main.js"></script>

	</body>
</html>
