<!DOCTYPE html>
<html>
<head>
    <title>Multi-Category Detection Test</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .test-case { margin: 15px 0; padding: 10px; border: 1px solid #ccc; }
        .result { margin-top: 10px; font-weight: bold; color: green; }
        textarea { width: 100%; height: 60px; }
    </style>
</head>
<body>
    <h1>Multi-Category Detection Test</h1>
    <p>Test cases to verify multiple category detection works:</p>
    
    <div class="test-case">
        <p><strong>Test 1: Robbery + Assault</strong></p>
        <textarea id="test1">Gang robbed store and beat people inside</textarea>
        <button onclick="testCategory('test1')">Test</button>
        <div class="result" id="result1"></div>
    </div>

    <div class="test-case">
        <p><strong>Test 2: Stabbing + Robbery</strong></p>
        <textarea id="test2">Man stabbed and robbed on the street</textarea>
        <button onclick="testCategory('test2')">Test</button>
        <div class="result" id="result2"></div>
    </div>

    <div class="test-case">
        <p><strong>Test 3: Shooting + Kidnapping</strong></p>
        <textarea id="test3">Gunmen shot at vehicles and kidnapped a woman</textarea>
        <button onclick="testCategory('test3')">Test</button>
        <div class="result" id="result3"></div>
    </div>

    <div class="test-case">
        <p><strong>Test 4: Fire + Missing Person</strong></p>
        <textarea id="test4">House fire and a child is missing in the area</textarea>
        <button onclick="testCategory('test4')">Test</button>
        <div class="result" id="result4"></div>
    </div>

    <div class="test-case">
        <p><strong>Test 5: Sexual Assault + Robbery</strong></p>
        <textarea id="test5">Woman was raped and her bag was stolen</textarea>
        <button onclick="testCategory('test5')">Test</button>
        <div class="result" id="result5"></div>
    </div>

    <script>
        // Copy the essential functions from main.js for testing
        function deriveCategoryFromText(text) {
            if (!text || text.trim().length === 0) return '';
            
            var lowerText = text.toLowerCase();
            
            var patterns = [
                // Robbery patterns
                { pattern: /\b(robbery|robbed|robbing|stole|stealing|shoplifting|burglary|stealing from|pickpocket|pick-pocket|pickpocketing)\b/i, category: 'robbery' },
                
                // Fire patterns
                { pattern: /\b(fire|burning|burnt|caught fire|house fire|building fire|fire accident|wildfire|accidental fire|arson)\b/i, category: 'fire_accident' },
                
                // Cultism patterns
                { pattern: /\b(cult|cultism|cultic|secret society|black market|gang|gangster|mafia|organized crime)\b/i, category: 'cultism' },
                
                // Assault patterns
                { pattern: /\b(assault|assaulted|hit|hitting|beat|beaten|beaten up|punch|punched|slap|slapped|injury|injured|attack|attacked|fighting|fought)\b/i, category: 'assault' },
                
                // Kidnapping patterns
                { pattern: /\b(kidnap|kidnapped|kidnapping|abduct|abducted|abduction|ransom|hostage)\b/i, category: 'kidnapping' },
                
                // Vandalism patterns
                { pattern: /\b(vandalism|vandal|vandalized|damaged property|destroyed property|property damage|graffiti|spray painted)\b/i, category: 'vandalism' },
                
                // Domestic violence patterns
                { pattern: /\b(domestic violence|abused|abusive|domestic abuse|spouse abuse|wife beating|husband beating|intimate partner violence|family violence|domestic fight)\b/i, category: 'domestic_violence' },
                
                // Suicide patterns
                { pattern: /\b(suicide|suicidal|killed himself|killed herself|hung himself|hung herself|took his own life|took her own life|commit suicide)\b/i, category: 'suicide' },
                
                // Homicide patterns
                { pattern: /\b(murder|murdered|killing|killed|homicide|manslaughter|dead body|corpse)\b/i, category: 'homicide' },
                
                // Shooting patterns
                { pattern: /\b(shooting|shot|gunfire|gunshot|gun attack|open fire|fired at|armed with gun|pistol|rifle|bullets)\b/i, category: 'shooting' },
                
                // Armed attack patterns
                { pattern: /\b(armed attack|armed robbery|stabbing|stabbed|knife attack|machete|axe attack|armed assault)\b/i, category: 'armed_attack' },
                
                // Road accident patterns
                { pattern: /\b(road accident|car accident|traffic accident|accident|hit by|vehicle collision|crashed|collision)\b/i, category: 'road_accident' },
                
                // Medical emergency patterns
                { pattern: /\b(medical emergency|emergency|sick|illness|disease|poison|poisoned|overdose|injury|injured|accident|collapse|heart attack|stroke)\b/i, category: 'medical_emergency' },
                
                // Missing person patterns
                { pattern: /\b(missing|missing person|lost|missing child|missing woman|missing man|cannot be found|whereabouts unknown)\b/i, category: 'missing_person' },
                
                // Fight patterns
                { pattern: /\b(fight|fighting|fought|brawl|brawling|conflict|confrontation)\b/i, category: 'fight' },
                
                // Suspicious activity patterns
                { pattern: /\b(suspicious|suspected|suspicion)\b/i, category: 'suspicious_activity' }
            ];

            // Check patterns and collect ALL matches (for multi-category support)
            var matchedCategories = [];
            for (var i = 0; i < patterns.length; i++) {
                if (patterns[i].pattern.test(lowerText)) {
                    if (!matchedCategories.includes(patterns[i].category)) {
                        matchedCategories.push(patterns[i].category);
                    }
                }
            }
            
            // High-priority sexual assault detection (add to matches, don't return early)
            if (/\b(rape|raped|sexual assault|sexually assaulted|forced to have sex|forcefully slept with|molest|molested|molestation|sexual abuse|sex abuse|defile|defiled)\b/i.test(lowerText)) {
                var ageMatch = lowerText.match(/(\b(\d{1,2})\s*(years|yrs|year|y|months|mos)\b)/i);
                if (ageMatch && parseInt(ageMatch[2], 10) <= 16) {
                    if (!matchedCategories.includes('child_sexual_abuse')) {
                        matchedCategories.push('child_sexual_abuse');
                    }
                } else {
                    if (!matchedCategories.includes('sexual_assault')) {
                        matchedCategories.push('sexual_assault');
                    }
                }
            }

            // If we found multiple matches, return them comma-separated
            if (matchedCategories.length > 0) {
                return matchedCategories.join(', ');
            }
            
            return 'uncategorized';
        }

        function testCategory(testId) {
            var textarea = document.getElementById(testId);
            var resultDiv = document.getElementById('result' + testId.replace('test', ''));
            var text = textarea.value;
            var category = deriveCategoryFromText(text);
            resultDiv.textContent = 'Categories: ' + category;
        }
    </script>
</body>
</html>
